<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Scoops & Smiles</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 20px;
            cursor: pointer;
            margin-bottom: 24px;
        }
        .gallery-item img {
            transition: transform 0.5s ease;
            width: 100%;
            height: 100%;
            object-fit: cover;
            aspect-ratio: 1/1;
        }
        .gallery-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 107, 107, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            color: white;
            font-size: 1.5rem;
        }
        .gallery-item:hover img {
            transform: scale(1.1);
        }
        .gallery-item:hover .gallery-overlay {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>


    <!-- Gallery Section -->
    <section class="section-padding">
        <div class="container">
            <div class="section-title">
                <h1>Sweet <span class="text-primary">Moments</span></h1>
                <p>A glimpse into our world of flavors and fun.</p>
            </div>
            
            <div class="row g-4">
                <div class="col-md-4 col-6">
                    <div class="gallery-item">
                        <img src="https://images.unsplash.com/photo-1501443762994-82bd5dace89a?q=80&w=800&auto=format&fit=crop" alt="Ice Cream">
                        <div class="gallery-overlay"><i class="fas fa-plus"></i></div>
                    </div>
                </div>
                <div class="col-md-4 col-6">
                    <div class="gallery-item">
                        <img src="https://images.unsplash.com/photo-1497034825429-c343d7c6a68f?q=80&w=800&auto=format&fit=crop" alt="Ice Cream Shop">
                        <div class="gallery-overlay"><i class="fas fa-plus"></i></div>
                    </div>
                </div>
                <div class="col-md-4 col-6">
                    <div class="gallery-item">
                        <img src="https://images.unsplash.com/photo-1563805042-7684c019e1cb?q=80&w=800&auto=format&fit=crop" alt="Flavors">
                        <div class="gallery-overlay"><i class="fas fa-plus"></i></div>
                    </div>
                </div>
                <div class="col-md-4 col-6">
                    <div class="gallery-item">
                        <img src="https://images.unsplash.com/photo-1549395156-9747d27e1482?q=80&w=800&auto=format&fit=crop" alt="Catering Event">
                        <div class="gallery-overlay"><i class="fas fa-plus"></i></div>
                    </div>
                </div>
                <div class="col-md-4 col-6">
                    <div class="gallery-item">
                        <img src="https://images.unsplash.com/photo-1516559173920-171049339a7a?q=80&w=800&auto=format&fit=crop" alt="Smiles">
                        <div class="gallery-overlay"><i class="fas fa-plus"></i></div>
                    </div>
                </div>
                <div class="col-md-4 col-6">
                    <div class="gallery-item">
                        <img src="https://images.unsplash.com/photo-1551024506-0bcc0629729b?q=80&w=800&auto=format&fit=crop" alt="Waffle Cone">
                        <div class="gallery-overlay"><i class="fas fa-plus"></i></div>
                    </div>
                </div>
                <div class="col-md-4 col-6">
                    <div class="gallery-item">
                        <img src="https://images.unsplash.com/photo-1576506295286-5cda18df43e7?q=80&w=800&auto=format&fit=crop" alt="Toppings">
                        <div class="gallery-overlay"><i class="fas fa-plus"></i></div>
                    </div>
                </div>
                <div class="col-md-4 col-6">
                    <div class="gallery-item">
                        <img src="https://images.unsplash.com/photo-1559703248-dcaaec9fab78?q=80&w=800&auto=format&fit=crop" alt="Gelato">
                        <div class="gallery-overlay"><i class="fas fa-plus"></i></div>
                    </div>
                </div>
                <div class="col-md-4 col-6">
                    <div class="gallery-item">
                        <img src="https://images.unsplash.com/photo-1560008511-11c63416e52d?q=80&w=800&auto=format&fit=crop" alt="Seasonal Specials">
                        <div class="gallery-overlay"><i class="fas fa-plus"></i></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Common Components JS -->
    <script src="js/loader.js"></script>
    <script src="js/header.js"></script>
    <script src="js/footer.js"></script>
    <!-- Custom JS -->
    <script src="js/main.js"></script>
</body>
</html>
