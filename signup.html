<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Join the Scoops & Smiles Sweet Club</title>
    <meta name="description"
        content="Join the Scoops & Smiles Sweet Club! Create a free account to earn rewards, get birthday treats, unlock member-only deals, and be first to taste our newest seasonal flavors.">
    <meta name="keywords"
        content="ice cream signup, join Scoops and Smiles, sweet club membership, dessert rewards program, ice cream loyalty, create account, new member, scoop club, birthday treats, exclusive ice cream deals">
    <link rel="icon" type="image/png" href="favicon.png">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <script>
        if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    </script>
</head>

<body>
    <div class="auth-nav-icons">
        <span id="theme-toggle" class="nav-icon me-2" title="Toggle Theme">
            <i class="fas fa-moon"></i>
        </span>
        <span id="rtl-toggle" class="nav-icon" title="Toggle RTL">
            <i class="fas fa-left-right"></i>
        </span>
    </div>

    <div class="auth-page-wrapper position-relative">


        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-5 col-md-8 col-sm-11">
                    <div class="card auth-card p-4">
                        <div class="card-body">
                            <a href="index.html" class="auth-logo">
                                <i class="fas fa-ice-cream me-2"></i>Scoops & Smiles
                            </a>

                            <div class="text-center mb-4">
                                <h1 class="h3 fw-bold font-heading">Create Account</h1>
                                <p class="text-muted small">Join the Sweetest Club in town!</p>
                            </div>

                            <form action="#" class="needs-validation" novalidate>
                                <div class="mb-3">
                                    <label for="name" class="form-label fw-bold small">Full Name</label>
                                    <input type="text" class="form-control p-3 bg-light border-0" id="name"
                                        placeholder="Full Name" required>
                                </div>
                                <div class="mb-3">
                                    <label for="email" class="form-label fw-bold small">Email Address</label>
                                    <input type="email" class="form-control p-3 bg-light border-0" id="email"
                                        placeholder="Email" required>
                                </div>
                                <div class="mb-3">
                                    <label for="password" class="form-label fw-bold small">Password</label>
                                    <div class="password-field">
                                        <input type="password" class="form-control p-3 bg-light border-0" id="password"
                                            placeholder="Min. 8 characters" required>
                                        <span class="toggle-password">
                                            <i class="fas fa-eye"></i>
                                        </span>
                                    </div>
                                </div>
                                <div class="mb-3 form-check">
                                    <input type="checkbox" class="form-check-input" id="terms" required>
                                    <label class="form-check-label text-muted small" for="terms">I agree to the <a
                                            href="#" class="text-decoration-none">Terms of Service</a></label>
                                </div>
                                <div class="d-grid gap-2 mt-4">
                                    <button class="btn btn-primary-custom btn-lg rounded-pill py-3" type="submit">Sign
                                        Up</button>
                                </div>
                            </form>

                            <div class="social-auth-btns">
                                <a href="#" class="btn-social btn-google">
                                    <i class="fab fa-google"></i> Google
                                </a>
                                <a href="#" class="btn-social btn-apple">
                                    <i class="fab fa-apple"></i> Apple
                                </a>
                                <a href="#" class="btn-social btn-facebook">
                                    <i class="fab fa-facebook-f"></i> Facebook
                                </a>
                            </div>

                            <div class="text-center mt-4">
                                <p class="text-muted small mb-0">Already have an account? <a href="login.html"
                                        class="text-primary fw-bold text-decoration-none">Log In</a></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/loader.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
