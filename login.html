<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Scoops & Smiles Gourmet Member</title>
    <meta name="description"
        content="Log in to your Scoops & Smiles account to manage your rewards, view your sweet history, and access exclusive member-only flavor previews.">
    <link rel="icon" type="image/png" href="favicon.png">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <script>
        if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    </script>
</head>

<body>
    <div class="auth-nav-icons">
        <span id="theme-toggle" class="nav-icon me-2" title="Toggle Theme">
            <i class="fas fa-moon"></i>
        </span>
        <span id="rtl-toggle" class="nav-icon" title="Toggle RTL">
            <i class="fas fa-language"></i>
        </span>
    </div>

    <div class="auth-page-wrapper position-relative">


        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-5 col-md-8 col-sm-11">
                    <div class="card auth-card p-4">
                        <div class="card-body">
                            <a href="index.html" class="auth-logo">
                                <i class="fas fa-ice-cream me-2"></i>Scoops & Smiles
                            </a>

                            <div class="text-center mb-4">
                                <h1 class="h3 fw-bold font-heading">Welcome Back!</h1>
                                <p class="text-muted small">Log in to your Sweet Account</p>
                            </div>

                            <form action="#" class="needs-validation" novalidate>
                                <div class="mb-4">
                                    <label for="email" class="form-label fw-bold small">Email Address</label>
                                    <input type="email" class="form-control p-3 bg-light border-0" id="email"
                                        placeholder="Email" required>
                                </div>
                                <div class="mb-4">
                                    <label for="password" class="form-label fw-bold small">Password</label>
                                    <div class="password-field">
                                        <input type="password" class="form-control p-3 bg-light border-0" id="password"
                                            placeholder="Enter your password" required>
                                        <span class="toggle-password">
                                            <i class="fas fa-eye"></i>
                                        </span>
                                    </div>
                                </div>
                                <div class="mb-4 remember-forgot-row">
                                    <div class="form-check">
                                        <input type="checkbox" class="form-check-input" id="remember">
                                        <label class="form-check-label text-muted small" for="remember">Remember
                                            me</label>
                                    </div>
                                    <a href="#" class="text-primary small fw-bold text-decoration-none">Forgot
                                        Password?</a>
                                </div>
                                <div class="d-grid gap-2 mt-4">
                                    <button class="btn btn-primary-custom btn-lg rounded-pill py-3" type="submit">Log
                                        In</button>
                                </div>
                            </form>

                            <div class="social-auth-btns">
                                <a href="#" class="btn-social btn-google">
                                    <i class="fab fa-google"></i> Google
                                </a>
                                <a href="#" class="btn-social btn-facebook">
                                    <i class="fab fa-facebook-f"></i> Facebook
                                </a>
                            </div>

                            <div class="text-center mt-4">
                                <p class="text-muted small mb-0">Don't have an account? <a href="signup.html"
                                        class="text-primary fw-bold text-decoration-none">Sign Up</a></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/loader.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
